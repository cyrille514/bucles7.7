<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Números Capicúa</title>
    <!-- Importación de Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
    @layer base {
      :root {
        line-height: 1.6;
      }
 
      }
  </style>


</head>
<body class="bg-[url('usertech.jpg')] bg-cover bg-center bg-no-repeat w-full h-96 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md mx-4">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Indica si un numero es capicúa</h1>
        <p class="text-sm text-shadow-black mb-6">Se lee igual de izquierda a derecha que de derecha a izquierda.</p>
        
        <div class="mb-4">
            <label for="numero" class="block text-sm font-semibold text-slate-700 mb-2">Ingresa un número:</label>
            <input type="number" id="numero" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. 1001">
        </div>

        <button id="verificar" class="w-full bg-orange-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition duration-200 cursor-pointer">
            Verificar número
        </button>

        <div id="resultado" class="mt-6 text-center font-semibold text-lg hidden"></div>
    </div>

    <!-- Vinculación del archivo JavaScript -->
    <script src="./js/app.js"></script>
</body>
</html>
